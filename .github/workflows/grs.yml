name: Update README cards

on:
  schedule:
    - cron: "0 */12 * * *" # Runs every 12 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=cameronbrooks11&show_icons=true&theme=tokyonight&card_width=500
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top langs card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=cameronbrooks11&theme=tokyonight&langs_count=10&card_width=500
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild stats card from split queries if GraphQL failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/stats-fallback.sh cameronbrooks11

      - name: Reject upstream error cards
        run: |
          if grep -q "Something went wrong" profile/*.svg; then
            echo "Card generation and fallback both failed; keeping previous SVGs"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add profile/*.svg

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update README stats"
          git push
